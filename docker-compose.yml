services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ../train:/datasets/train:ro
      - ../test_done:/datasets/test:ro
    networks:
      - med-net
    environment:
      APP_ROLE: api
      API_URL: http://api:8000
      TRAIN_DATA_DIR: /datasets/train
      TEST_DATA_DIR: /datasets/test
      HIP_DYSPLASIA_MODEL_MANIFEST: /app/models/checkpoints/resnet50_bce_v1/model_manifest.json
      HIP_DYSPLASIA_KEYPOINT_CHECKPOINT: /app/models/checkpoints/resnet50_mtddh_keypoints_v1/best.ckpt
      HIP_DYSPLASIA_KEYPOINT_DEVICE: auto
      PYTHONUNBUFFERED: "1"

  frontend:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - ./:/app
      - ../train:/datasets/train:ro
      - ../test_done:/datasets/test:ro
    environment:
      APP_ROLE: frontend
      API_URL: http://api:8000
      TRAIN_DATA_DIR: /datasets/train
      TEST_DATA_DIR: /datasets/test
      PYTHONUNBUFFERED: "1"
    networks:
      - med-net

networks:
  med-net:
    driver: bridge
